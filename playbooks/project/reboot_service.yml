- name: Restart an approved service on an approved target
  hosts: managed_target
  gather_facts: false
  become: true
  tasks:
    - name: Restart the approved service
      ansible.builtin.systemd:
        name: "{{ approved_service_name }}"
        state: restarted
      register: restart_result

    - name: Verify that the service is active
      ansible.builtin.command:
        argv: ["systemctl", "is-active", "{{ approved_service_name }}"]
      register: active_result
      changed_when: false
      failed_when: active_result.stdout.strip() != "active"
