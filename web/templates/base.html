<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Assistant Ticketing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">🚀 DevOps Ticket AI</a>
            {% if user.is_authenticated %}
            <div class="d-flex align-items-center text-white">
                <span class="me-3">Hola, <strong>{{ user.username }}</strong></span>
                <a href="{% url 'tickets:list' %}" class="btn btn-outline-light btn-sm me-2">Mis Tickets</a>
                <form action="{% url 'logout' %}" method="post" class="m-0">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger btn-sm">Salir</button>
                </form>
            </div>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
