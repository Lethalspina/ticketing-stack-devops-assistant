<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{% block title %}Ticketing{% endblock %}</title><style>body{font-family:system-ui;max-width:1000px;margin:auto;padding:1rem}nav{display:flex;gap:1rem;align-items:center}textarea,input{width:100%;box-sizing:border-box}.msg{padding:.7rem;background:#eef}.errorlist{color:#a00}pre{white-space:pre-wrap;background:#f4f4f4;padding:1rem}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #ddd;padding:.5rem;text-align:left}</style></head><body>
<nav><a href="{% url 'tickets:list' %}">Mis tickets</a><a href="{% url 'tickets:create' %}">Nuevo</a>{% if user.is_authenticated %}<span>{{ user.username }}</span><form method="post" action="{% url 'logout' %}">{% csrf_token %}<button type="submit">Cerrar sesión</button></form>{% endif %}</nav>
{% for message in messages %}<p class="msg">{{ message }}</p>{% endfor %}<main>{% block content %}{% endblock %}</main></body></html>
