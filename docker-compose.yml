version: '3.8'

# ---- DEFINICIÓN DE REDES AISLADAS ----
networks:
  frontend-nw:
    description: "Red pública orientada al usuario final"
  backend-nw:
    description: "Red privada de datos (Django, Celery, DB, Redis)"
  ai-nw:
    description: "Red privada aislada para el ecosistema de Inteligencia Artificial"

services:
  db:
    image: postgres:15-alpine
    container_name: ticketing-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-ticketing_db}
      POSTGRES_USER: ${DB_USER:-postgres_user}
      # Fallback por si el .env no tiene asignada la clave DB_PASSWORD
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cambiame_por_un_password_seguro_local}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-nw  # Totalmente aislada del exterior y de la IA
    # HEALTHCHECK: Comprueba de forma nativa si Postgres acepta conexiones reales
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: ticketing-redis
    # SEGURIDAD: No exponemos el puerto al host exterior
    networks:
      - backend-nw
    # HEALTHCHECK: Comprueba que Redis responde al comando PING interno
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

  chroma:
    image: ghcr.io/chroma-core/chroma:0.4.24
    container_name: ticketing-chromadb
    # SEGURIDAD: Solo accesible dentro de la red IA.
    volumes:
      - chroma_data:/data
    networks:
      - ai-nw
    restart: always

  ollama:
    image: ollama/ollama:latest
    container_name: ticketing-ollama
    # SEGURIDAD: Aislado en la red de IA
    volumes:
      - ollama_storage:/root/.ollama
    networks:
      - ai-nw
    restart: always

  # --- NUEVO SERVICIO PARA MIGRACIONES AISLADAS ---
  db-migrator:
    build: ./web
    container_name: ticketing-migrator
    command: python manage.py migrate
    environment:
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
    networks:
      - backend-nw
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./web
    container_name: ticketing-django
    # Eliminado el comando "migrate" para evitar race conditions
    command: >
      bash -c "python manage.py collectstatic --noinput &&
               gunicorn portal.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    ports:
      - "8000:8000"  # El único contenedor accesible desde tu navegador
    volumes:
      # Mantenemos solo el mapeo de playbooks, eliminando ./web:/app para mantener la inmutabilidad
      - ./playbooks:/srv/playbooks
    environment:
      - DEBUG=${DEBUG}
      - SECRET_KEY=${DJANGO_SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=${REDIS_URL}
      - LDAP_SERVER=${LDAP_SERVER}
      - LDAP_BIND_DN=${LDAP_BIND_DN}
      - LDAP_BIND_PW=${LDAP_BIND_PW}
      - LDAP_BASE=${LDAP_BASE}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
    networks:
      - frontend-nw  # Para comunicarse con el usuario
      - backend-nw   # Para comunicarse con Postgres y Redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully # Espera a que termine la migración
    restart: always

  celery_worker:
    build: ./web
    container_name: ticketing-celery
    command: celery -A portal worker --loglevel=INFO --concurrency=2
    volumes:
      # Mantenemos solo el mapeo de playbooks, eliminando ./web:/app
      - ./playbooks:/srv/playbooks
    environment:
      - DEBUG=${DEBUG}
      - SECRET_KEY=${DJANGO_SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=${REDIS_URL}
      - CHROMA_URL=${CHROMA_URL}
      - OLLAMA_URL=${OLLAMA_URL}
      - MODEL_NAME=${MODEL_NAME}
      - EMBED_MODEL=${EMBED_MODEL}
      - COLLECTION_NAME=${COLLECTION_NAME}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
    networks:
      - backend-nw  # Para leer las colas de Redis y guardar resultados en Postgres
      - ai-nw       # Puente hacia Ollama y ChromaDB para ejecutar el flujo RAG
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
      ollama:
        condition: service_started
      db-migrator:
        condition: service_completed_successfully # Los workers también esperan a la migración
    restart: always

volumes:
  postgres_data:
  chroma_data:
  ollama_storage: