name: ticketing-stack

networks:
  frontend-nw:
  backend-nw:
    internal: true
  ai-nw:
    internal: true

volumes:
  postgres_data:
  chroma_data:
  ollama_storage:
  staticfiles:

x-app-env: &app-env
  DEBUG: ${DEBUG:-False}
  SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
  CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8000}
  SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-False}
  DB_NAME: ${DB_NAME:?DB_NAME is required}
  DB_USER: ${DB_USER:?DB_USER is required}
  DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
  DB_HOST: db
  DB_PORT: "5432"
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
  LDAP_SERVER: ${LDAP_SERVER:-}
  LDAP_BIND_DN: ${LDAP_BIND_DN:-}
  LDAP_BIND_PW: ${LDAP_BIND_PW:-}
  LDAP_BASE: ${LDAP_BASE:-}
  LDAP_ADMIN_GROUP_DN: ${LDAP_ADMIN_GROUP_DN:-}
  LDAP_REQUIRE_CERT: ${LDAP_REQUIRE_CERT:-True}
  EMAIL_HOST: ${EMAIL_HOST:-}
  EMAIL_PORT: ${EMAIL_PORT:-587}
  EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
  EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
  ADMIN_EMAIL: ${ADMIN_EMAIL:-}

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [backend-nw]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "256mb", "--maxmemory-policy", "noeviction"]
    networks: [backend-nw]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]

  chroma:
    image: ghcr.io/chroma-core/chroma:0.4.24
    volumes:
      - chroma_data:/chroma/chroma
    networks: [ai-nw]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]

  ollama:
    image: ollama/ollama:0.6.8
    volumes:
      - ollama_storage:/root/.ollama
    networks: [ai-nw]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]

  db-migrator:
    build:
      context: ./web
      target: runtime
    command: ["python", "manage.py", "migrate", "--noinput"]
    environment: *app-env
    networks: [backend-nw]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    security_opt: ["no-new-privileges:true"]

  web:
    build:
      context: ./web
      target: runtime
    command: ["gunicorn", "portal.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "3", "--timeout", "60", "--access-logfile", "-", "--error-logfile", "-"]
    environment: *app-env
    volumes:
      - staticfiles:/app/staticfiles
    ports:
      - "127.0.0.1:8000:8000"
    networks: [frontend-nw, backend-nw]
    depends_on:
      db-migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]

  celery-analysis:
    build:
      context: ./web
      target: runtime
    command: ["celery", "-A", "portal", "worker", "-Q", "analysis", "--loglevel=INFO", "--concurrency=2"]
    environment:
      <<: *app-env
      CHROMA_HOST: ${CHROMA_HOST:-chroma}
      CHROMA_PORT: ${CHROMA_PORT:-8000}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      MODEL_NAME: ${MODEL_NAME:-llama3.1:8b}
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      COLLECTION_NAME: ${COLLECTION_NAME:-ticket-history}
      ALLOWED_TARGETS_JSON: ${ALLOWED_TARGETS_JSON:-{"local-lab":"127.0.0.1"}}
      ALLOWED_SERVICES_JSON: ${ALLOWED_SERVICES_JSON:-{"web":"nginx"}}
    networks: [backend-nw, ai-nw]
    depends_on:
      db-migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]

  celery-automation:
    build:
      context: ./web
      target: automation
    command: ["celery", "-A", "portal", "worker", "-Q", "automation", "--loglevel=INFO", "--concurrency=1"]
    environment:
      <<: *app-env
      CHROMA_HOST: ${CHROMA_HOST:-chroma}
      CHROMA_PORT: ${CHROMA_PORT:-8000}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      COLLECTION_NAME: ${COLLECTION_NAME:-ticket-history}
      ALLOWED_TARGETS_JSON: ${ALLOWED_TARGETS_JSON:-{"local-lab":"127.0.0.1"}}
      ALLOWED_SERVICES_JSON: ${ALLOWED_SERVICES_JSON:-{"web":"nginx"}}
      ANSIBLE_REMOTE_USER: ${ANSIBLE_REMOTE_USER:-automation}
    volumes:
      - ./playbooks:/srv/playbooks:ro
    networks: [backend-nw, ai-nw]
    depends_on:
      db-migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
